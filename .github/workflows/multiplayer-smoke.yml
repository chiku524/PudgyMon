name: Bevy Multiplayer Smoke Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Bevy Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxkbcommon-x11-dev \
            libx11-dev \
            libxcb1-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            mesa-vulkan-drivers \
            xvfb

      - name: Unit and integration tests
        run: cargo test

      - name: Headless multiplayer smoke test
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          WGPU_BACKEND: gl
        run: xvfb-run -a bash scripts/run_mp_smoke_test.sh
